<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONA - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-body {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url("{{ url_for('static', filename='images/bglogin.png') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
        }
        .login-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }
        .left-side {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }
        .left-side::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            background: linear-gradient(135deg, rgba(30, 60, 114, 0.9) 0%, rgba(42, 82, 152, 0.9) 100%);
        }
        .left-side * {
            position: relative;
            z-index: 1;
        }
        .left-side h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: white;
        }
        .left-side p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1rem;
        }
        .right-side {
            padding: 3rem;
        }
        .form-title {
            font-size: 2rem;
            font-weight: 600;
            color: #1e3c72;
            margin-bottom: 2rem;
            text-align: center;
        }
        .form-control {
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            padding: 0.8rem 1rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #1e3c72;
            box-shadow: 0 0 0 0.2rem rgba(30, 60, 114, 0.25);
        }
        .form-label {
            color: #495057;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        .btn-primary {
            background: #1e3c72;
            border: none;
            padding: 0.8rem;
            border-radius: 10px;
            font-weight: 500;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: #2a5298;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30, 60, 114, 0.3);
        }
        .btn-return {
            background: transparent;
            border: 2px solid #1e3c72;
            color: #1e3c72;
            margin-top: 1rem;
        }
        .btn-return:hover {
            background: #1e3c72;
            color: white;
        }
        .form-check-input:checked {
            background-color: #1e3c72;
            border-color: #1e3c72;
        }
        .alert {
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }
        .logo-img {
            max-width: 350px;
            margin: -2rem 0;
        }
        .water-phrase {
            background: rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            border-radius: 15px;
            margin-top: 2rem;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-style: Bold;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        .water-phrase:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }
        .water-phrase i {
            font-size: 1.5rem;
            color: #4dabf7;
            margin-bottom: 0.5rem;
            display: block;
        }
        .water-phrase span {
            font-size: 1.1rem;
            line-height: 1.6;
            display: block;
        }
        .spark-heading {
            color: white;
            font-weight: bold;
            margin-top: -1rem;
        }
    </style>
</head>
<body class="login-body">
    <div class="container login-container">
        <div class="row justify-content-center min-vh-100 align-items-center">
            <div class="col-12">
                <div class="login-card">
                    <div class="row g-0">
                        <div class="col-md-6 left-side">
                            <h1>Office National de l'Assainissement</h1>
                            <h2 class="spark-heading">SparK</h2>
                            <img src="{{ url_for('static', filename='images/ona-logo.png') }}" alt="ONA Logo" class="logo-img">
                            <p>Système de Gestion Centralisée des Données</p>
                            <div class="water-phrase">
                                <i class="bi bi-water me-2"></i>
                                <span>{{ water_phrase }}</span>
                            </div>
                        </div>
                        <div class="col-md-6 right-side">
                            <div class="p-4">
                                <h2 class="form-title">Connexion à l'Office</h2>
                                {% with messages = get_flashed_messages() %}
                                    {% if messages %}
                                        {% for message in messages %}
                                            <div class="alert alert-danger">{{ message }}</div>
                                        {% endfor %}
                                    {% endif %}
                                {% endwith %}
                                <form method="POST" action="{{ url_for('auth.login') }}">
                                    <div class="mb-4">
                                        <label for="username" class="form-label">Nom d'utilisateur</label>
                                        <input type="text" class="form-control" id="username" name="username" required>
                                    </div>
                                    <div class="mb-4">
                                        <label for="password" class="form-label">Mot de passe</label>
                                        <input type="password" class="form-control" id="password" name="password" required>
                                    </div>
                                    <div class="mb-4 form-check">
                                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                                        <label class="form-check-label" for="remember">Se souvenir de moi</label>
                                    </div>
                                    <div class="d-grid gap-2">
                                        <button type="submit" class="btn btn-primary">Se connecter</button>
                                        <a href="{{ url_for('index') }}" class="btn btn-primary btn-return">
                                            <i class="bi bi-arrow-left me-2"></i>Retour à l'accueil
                                        </a>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
